<!DOCTYPE html>

<style>
  html::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 490;
    background-color: #120D0F;
    background-image: url(/src/logo/logo_def1.svg);
    background-repeat: no-repeat;
    background-position: center calc(50% - 20px);
    background-size: 80px auto;
    pointer-events: none;
    transition: opacity .3s ease, visibility .3s ease;
  }
  html::after {
    content: '';
    position: fixed;
    left: 50%;
    top: calc(50% + 50px);
    transform: translateX(-50%);
    z-index: 490;
    width: 100px;
    height: 2px;
    border-radius: 2px;
    background: linear-gradient(90deg,
      transparent 0%, #fba002 50%, transparent 100%);
    background-size: 50% 100%;
    background-repeat: no-repeat;
    animation: sp-slide .9s ease-in-out infinite;
    pointer-events: none;
    transition: opacity .3s ease, visibility .3s ease;
  }
  @keyframes sp-slide {
    0%   { background-position: -50% center; }
    100% { background-position: 150% center; }
  }
  html.splash-done::before,
  html.splash-done::after {
    opacity: 0;
    visibility: hidden;
  }
</style>

  <!-- SVG Glass Filter -->
  <svg width="0" height="0" style="position:absolute;pointer-events:none">
    <defs>
      <filter id="glass-filter" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.010 0.018" numOctaves="3" seed="2" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="35" xChannelSelector="R" yChannelSelector="G"/>
        <feColorMatrix type="saturate" values="1.2"/>
        <feComposite in2="SourceGraphic" operator="in"/>
      </filter>
    </defs>
  </svg>
