<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <style>html{visibility:hidden;background:#120D0F}</style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Todas as modalidades, equipa e inscrições da HIIT-Gym Montijo.">
  <meta name="theme-color" content="#fba002">
  <title>Modalidades — HIIT-Gym</title>

  <link rel="icon" type="image/svg+xml" href="/src/logo/favicon.svg">
  <link rel="manifest" href="/manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Saira:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer">

  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/modalidades/modalidades.css">

<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
</head>

<body id="modalidades-page">
  <header>
    <img class="bg" src="/src/BG_hero-home.jpg" alt="Imagem de um ginásio">
    
    <div class="hero">
      <span class="page-eyebrow">
        <i class="fa-solid fa-layer-group"></i> hiit-gym montijo
      </span>
      <h1>As nossas <span>Modalidades</span></h1>
      <p>
        Encontra a actividade ideal para os teus objectivos
        e inscreve-te directamente aqui.
      </p>
    </div>
  </header>

  <main>
  <!-- ── SECÇÃO: MODALIDADES ── -->
    <section class="mod" id="modalidades">
      <div class="sec-label">
        <span class="eyebrow">O que oferecemos</span>
        <h2>Modalidades</h2>
      </div>
      <!-- Cards injectados pelo JS -->
      <div class="mod-lista" id="mod-lista"></div>
    </section>

    <!-- ── SECÇÃO: EQUIPA ── -->
    <section class="equipa" id="equipa">
      <div class="sec-label">
        <span class="eyebrow">Os nossos profissionais</span>
        <h2>Equipa</h2>
      </div>
      <!-- Grid injectada pelo JS -->
      <div class="equipa-grid" id="equipa-grid"></div>
    </section>

    <!-- ── SECÇÃO: INSCRIÇÃO ── -->
    <section class="inscricao golden-border" id="inscricao">
      <div class="sec-label">
        <span class="eyebrow">Junta-te a nós</span>
        <h2>Inscrição</h2>
      </div>

      <!-- Conteúdo injectado pelo JS (step1: lista / step2: form) -->
      <div id="insc-wrap"></div>
    </section>
  </main>
  
  <!-- SVG Glass Filter -->
  <svg width="0" height="0" style="position:absolute;pointer-events:none">
    <defs>
      <filter id="glass-filter" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.010 0.018" numOctaves="3" seed="2" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="35" xChannelSelector="R" yChannelSelector="G"/>
        <feColorMatrix type="saturate" values="1.2"/>
        <feComposite in2="SourceGraphic" operator="in"/>
      </filter>
    </defs>
  </svg>
  
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
  <script src="/supabase.js"></script>

  <!-- Dados -->
    <script src="/js/data/config.js?v=8"></script>
    <script src="/js/data/data-gym.js?v=8"></script>
    <script src="/js/data/data-actividades.js?v=8"></script>
    <script src="/js/data/data-blog.js?v=8"></script>

    <!-- Core -->
    <script src="/js/global.js?v=8"></script>
  <script src="/js/modalidades.js?v=8"></script>

  <script src="/chat.js"></script>

  <!-- SERVICE WORKER -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>
</html>
