<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — HIIT-Gym</title>
  <link rel="icon" type="image/svg+xml" href="/src/logo/favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@100..900&family=Saira:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer">

  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="admin.css">
  <style>body.loading { visibility: hidden; }</style>
</head>

<body class="loading" id="admin-page">

  <!-- NAV -->
  <header class="admin-header">
    <nav>
      <a class="logo btn" href="/index.html">
        <img src="/src/logo/logo_def1.svg" alt="HIIT-Gym">
      </a>
      <span class="admin-badge">
        <i class="fa-solid fa-shield-halved"></i> Painel Admin
      </span>
      <button class="btn glass btn-small" id="btn-logout-admin">
        <i class="fa-solid fa-right-from-bracket"></i> Sair
      </button>
    </nav>
  </header>

  <!-- TABS -->
  <div class="admin-tabs" role="tablist">
    <button class="admin-tab active" data-tab="inscricoes">
      <i class="fa-solid fa-clipboard-list"></i>
      Inscrições
      <span class="badge" id="badge-pendentes">0</span>
    </button>
    <button class="admin-tab" data-tab="membros">
      <i class="fa-solid fa-users"></i>
      Membros
    </button>
    <button class="admin-tab" data-tab="planos">
      <i class="fa-solid fa-credit-card"></i>
      Planos
    </button>
  </div>

  <!-- CONTEÚDO -->
  <main class="admin-main">

    <!-- TAB: INSCRIÇÕES -->
    <section id="tab-inscricoes" class="admin-section">
      <div class="section-header">
        <h2>Inscrições Pendentes</h2>
        <button class="btn glass btn-small" id="btn-refresh-insc">
          <i class="fa-solid fa-rotate"></i> Actualizar
        </button>
      </div>
      <div id="inscricoes-lista" class="admin-lista"></div>
    </section>

    <!-- TAB: MEMBROS -->
    <section id="tab-membros" class="admin-section hidden">
      <div class="section-header">
        <h2>Todos os Membros</h2>
        <div class="search-wrap">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="search-membros" placeholder="Pesquisar por nome ou email…">
        </div>
      </div>
      <div id="membros-lista" class="admin-lista"></div>
    </section>

    <!-- TAB: PLANOS -->
    <section id="tab-planos" class="admin-section hidden">
      <div class="section-header">
        <h2>Gestão de Planos</h2>
        <p class="section-desc">Altera o plano de qualquer membro.</p>
      </div>
      <div id="planos-lista" class="admin-lista"></div>
    </section>

  </main>

  <!-- TOAST -->
  <div id="admin-toast" class="admin-toast hidden"></div>

  <!-- SVG Glass Filter -->
  <svg width="0" height="0" style="position:absolute;pointer-events:none">
    <defs>
      <filter id="glass-filter" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.010 0.018" numOctaves="3" seed="2" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="35" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
        <feColorMatrix type="saturate" values="1.2" in="displaced" result="saturated"/>
        <feComposite in="saturated" in2="SourceGraphic" operator="in"/>
      </filter>
    </defs>
  </svg>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
  <script src="/supabase.js"></script>
  <script src="/js/data/config.js?v=3"></script>
  <script src="/js/global.js?v=3"></script>
  <script src="admin.js?v=3"></script>
</body>
</html>
