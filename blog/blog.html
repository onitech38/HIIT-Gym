<!DOCTYPE html>
<html lang="pt-PT">
<head>
<style>
  html::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 490;
    background-color: #120D0F;
    background-image: url(/src/logo/logo_def1.svg);
    background-repeat: no-repeat;
    background-position: center calc(50% - 20px);
    background-size: 80px auto;
    pointer-events: none;
    transition: opacity .3s ease, visibility .3s ease;
  }
  html::after {
    content: '';
    position: fixed;
    left: 50%;
    top: calc(50% + 50px);
    transform: translateX(-50%);
    z-index: 490;
    width: 100px;
    height: 2px;
    border-radius: 2px;
    background: linear-gradient(90deg, transparent 0%, #fba002 50%, transparent 100%);
    background-size: 50% 100%;
    background-repeat: no-repeat;
    animation: sp-slide .9s ease-in-out infinite;
    pointer-events: none;
    transition: opacity .3s ease, visibility .3s ease;
  }
  @keyframes sp-slide {
    0%   { background-position: -50% center; }
    100% { background-position: 150% center; }
  }
  html.splash-done::before,
  html.splash-done::after {
    opacity: 0;
    visibility: hidden;
  }
</style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#fba002">
  <meta name="description" content="Blog HIIT-Gym — novidades, dicas de treino, nutrição e saúde.">
  <title>Blog — HIIT-Gym</title>

  <link rel="icon" type="image/svg+xml" href="../src/logo/favicon.svg">
  <link rel="manifest" href="../manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@100..900&family=Saira:wght@100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="blog.css">    
</head>
<body id="blog-page">
  <header class="blog-header">
    <section class="blog-hero golden-border">
      <div class="blog-hero-content">
        <span class="blog-eyebrow">HIIT-Gym · Blog</span>
        <h1>Novidades, Dicas<br><span>e Inspiração</span></h1>
        <p>Treino, nutrição, saúde e as últimas notícias da academia.</p>
      </div>
    </section>
  </header>

  <main id="view-grid">
    <section class="blog-featured golden-border" id="blog-featured"></section>

    <section class="blog-filters-section golden-border">
      <div class="blog-filters">
        <button class="filter-btn active" data-cat="todos">Todos</button>
        <button class="filter-btn" data-cat="treino">Treino</button>
        <button class="filter-btn" data-cat="nutricao">Nutrição</button>
        <button class="filter-btn" data-cat="saude">Saúde</button>
        <button class="filter-btn" data-cat="novidade">Novidades</button>
      </div>
    </section>

    <section class="blog-grid golden-border" id="blog-grid"></section>

    <section class="blog-newsletter golden-border">
      <h3><i class="fa-solid fa-envelope"></i> Recebe os nossos artigos</h3>
      <p>Subscreve a newsletter e recebe semanalmente dicas e novidades.</p>

      <form class="newsletter-form" id="form-newsletter">
        <input type="email" placeholder="O teu email" required>
        <button type="submit" class="btn glass">Subscrever</button>
      </form>

      <p class="newsletter-nota">Sem spam. Cancela quando quiseres.</p>
    </section>
  </main>

  <!-- ARTICLE VIEW -->
  <div id="view-article" class="hidden">
    <div class="blog-reader-layout">
      <article id="article-main" class="article-full"></article>

      <aside class="article-sidebar">
        <h4 class="sidebar-titulo">Outros Artigos</h4>
        <div id="sidebar-lista"></div>
      </aside>
    </div>
  </div>

  
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
  <script src="/supabase.js"></script>

  <!-- Dados -->
  <script src="/js/data/config.js"></script>
  <script src="/js/data/data-gym.js"></script>
  <script src="/js/data/data-actividades.js"></script>
  <script src="/js/data/data-blog.js"></script>

  <!-- Core -->
  <script src="/js/global.js"></script>
  <script src="/js/blog.js"></script>

  <script src="/chat.js"></script>

  <!-- SERVICE WORKER -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>
</html>
