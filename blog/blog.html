<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#fba002">
  <meta name="description" content="Blog HIIT-Gym — novidades, dicas de treino, nutrição e saúde.">
  <title>Blog — HIIT-Gym</title>

  <link rel="icon" type="image/svg+xml" href="../src/logo/favicon.svg">
  <link rel="manifest" href="../manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@100..900&family=Saira:wght@100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../auth.css">
    <link rel="stylesheet" href="blog.css">

    <!-- AUTH GUARD — redirige se não estiver autenticado -->
    <script>
      (function() {
        try {
          const user = JSON.parse(localStorage.getItem('hiitgym_user'));
          if (!user) {
            // Guarda destino para voltar após login
            sessionStorage.setItem('hiitgym_redirect', 'blog/blog.html');
            window.location.replace('../index.html');
          }
        } catch(e) {
          window.location.replace('../index.html');
        }
      })();
    </script>    
</head>
<body id="blog-page">
  <header class="blog-header">
    <section class="blog-hero">
      <div class="blog-hero-content">
        <span class="blog-eyebrow">HIIT-Gym · Blog</span>
        <h1>Novidades, Dicas<br><span>e Inspiração</span></h1>
        <p>Treino, nutrição, saúde e as últimas notícias da academia.</p>
      </div>
    </section>
  </header>

  <main id="view-grid">
    <section class="blog-featured" id="blog-featured"></section>

    <section class="blog-filters-section">
      <div class="blog-filters">
        <button class="filter-btn active" data-cat="todos">Todos</button>
        <button class="filter-btn" data-cat="treino">Treino</button>
        <button class="filter-btn" data-cat="nutricao">Nutrição</button>
        <button class="filter-btn" data-cat="saude">Saúde</button>
        <button class="filter-btn" data-cat="novidade">Novidades</button>
      </div>
    </section>

    <section class="blog-grid" id="blog-grid"></section>

    <section class="blog-newsletter glass">
      <h3><i class="fa-solid fa-envelope"></i> Recebe os nossos artigos</h3>
      <p>Subscreve a newsletter e recebe semanalmente dicas e novidades.</p>

      <form class="newsletter-form" id="form-newsletter">
        <input type="email" placeholder="O teu email" required>
        <button type="submit" class="btn glass">Subscrever</button>
      </form>

      <p class="newsletter-nota">Sem spam. Cancela quando quiseres.</p>
    </section>
  </main>

  <!-- ARTICLE VIEW -->
  <div id="view-article" class="hidden">
    <div class="blog-reader-layout">
      <article id="article-main" class="article-full"></article>

      <aside class="article-sidebar">
        <h4 class="sidebar-titulo">Outros Artigos</h4>
        <div id="sidebar-lista"></div>
      </aside>
    </div>
  </div>

  <!-- SUPABASE PRIMEIRO -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
  <script src="/supabase.js"></script>

  <!-- DADOS GLOBAIS (ANTES DO JS DA PÁGINA) -->
  <script src="/js/coaches.js"></script>
  <script src="/js/modalidadesData.js"></script>
  <script src="/js/artigosData.js"></script>

  <!-- GLOBAL -->
  <script src="/js/global.js"></script>

  <!-- JS DA PÁGINA -->
  <script src="/js/blog.js"></script>


  <!-- CHAT (mantido, análise depois) -->
  <script src="/chat.js" defer></script>

  <!-- SERVICE WORKER -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>
</html>
